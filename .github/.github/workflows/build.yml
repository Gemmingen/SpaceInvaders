name: Build Launcher (Cross-Platform)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build auf ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: 1. Code auschecken
        uses: actions/checkout@v4

      - name: 2. Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Bibliotheken installieren
        run: |
          python -m pip install --upgrade pip
          pip install pygame pyinstaller

      - name: 4. Launcher verpacken
        run: |
          pyinstaller --noconsole launcher.py

      - name: 5. Artefakt hochladen (Immer)
        uses: actions/upload-artifact@v4
        with:
          name: Arcade-Launcher-${{ matrix.os }}
          path: dist/

      - name: 6. Zippen (Nur bei Tag)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          python -c "import shutil; shutil.make_archive('Launcher-${{ matrix.os }}', 'zip', 'dist')"

      - name: 7. Release erstellen (Nur bei Tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Launcher-${{ matrix.os }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
