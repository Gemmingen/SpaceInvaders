name: Build Launcher (Cross-Platform)

# Wann soll das Script laufen? Bei jedem Push auf den "main" Branch oder bei Tags.
on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build auf ${{ matrix.os }}
    # HIER PASSIERT DIE MAGIE: Die Matrix-Strategie
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # GitHub startet für jedes dieser Systeme parallel einen eigenen Job!
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: 1. Code auschecken (Code von GitHub laden)
        uses: actions/checkout@v4

      - name: 2. Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Eine stabile Python-Version

      - name: 3. Bibliotheken installieren (Pygame & PyInstaller)
        run: |
          python -m pip install --upgrade pip
          pip install pygame pyinstaller

      - name: 4. Launcher verpacken (PyInstaller ausführen)
        # Auf jedem System wird jetzt PyInstaller ausgeführt
        run: |
          pyinstaller --noconsole launcher.py

      - name: 5. Fertige Dateien als Download (Artefakt) bereitstellen
        uses: actions/upload-artifact@v4
        with:
          # Der Name des Downloads ändert sich je nach Betriebssystem dynamisch
          name: Arcade-Launcher-${{ matrix.os }}
          # Er lädt den kompletten dist-Ordner hoch, in dem eure fertige Datei liegt
          path: dist/

      - name: 6. Zippen für Release (Nur bei Tag)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          # Verpackt den dist-Ordner in ein ZIP, damit man es im Release einzeln laden kann
          python -c "import shutil; shutil.make_archive('Launcher-${{ matrix.os }}', 'zip', 'dist')"

      - name: 7. Release erstellen und hochladen (Nur bei Tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Launcher-${{ matrix.os }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
