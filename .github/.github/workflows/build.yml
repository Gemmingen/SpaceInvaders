name: Build Launcher (Cross-Platform)

on:
  push:
    branches: [ main ]
    tags:
      - 'v*' # Triggert das Release bei Version-Tags
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Ermöglicht manuelles Starten

permissions:
  contents: write # Erlaubt das Hochladen der Dateien in die Releases

jobs:
  build:
    name: Build auf ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Verhindert, dass ein Fehler auf einem OS alle anderen abbricht
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: 1. Code auschecken (Code von GitHub laden)
        uses: actions/checkout@v4

      - name: 2. Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Bibliotheken installieren (Pygame & PyInstaller)
        run: |
          python -m pip install --upgrade pip
          pip install pygame pyinstaller

      - name: 4. Launcher verpacken (PyInstaller ausführen)
        run: |
          pyinstaller --noconsole launcher.py

      - name: 5. Fertige Dateien als Download (Artefakt) bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: Arcade-Launcher-${{ matrix.os }}
          path: dist/

      - name: 6. Dateien für Release zippen
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          # Erstellt ein ZIP-Archiv vom Inhalt des dist-Ordners
          python -c "import shutil; shutil.make_archive('Launcher-${{ matrix.os }}', 'zip', 'dist')"

      - name: 7. Release erstellen und Dateien hochladen
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Launcher-${{ matrix.os }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
