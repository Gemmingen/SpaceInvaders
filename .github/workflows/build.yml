name: Build-Space-Invaders-Release

# Definiert die Auslöser (Triggers) für diese Pipeline.
on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Löst automatische Releases bei neuen Versions-Tags aus
  workflow_dispatch: # Ermöglicht manuelles Triggern über GitHub

permissions:
  contents: write

jobs:
  build:
    name: Build auf ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    # --- Build-Matrix (Plattform-Definitionen) ---
    strategy:
      fail-fast: false # Verhindert, dass alle Builds abbrechen, falls ein einzelnes OS fehlschlägt.
      matrix:
        include:
          - os: windows-latest
            artifact_name: Windows
          - os: macos-latest
            artifact_name: Mac_Silicon # Nativer Build für Apple Silicon (M-Chips)
          - os: macos-latest
            artifact_name: Mac_Intel   # Emulierter Build für Intel Macs
          - os: ubuntu-latest
            artifact_name: Linux

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          # WICHTIG: 'websockets' hinzugefügt, um den ModuleNotFoundError zur Laufzeit zu beheben!
          pip install "setuptools<69.0.0" pygame websockets pyinstaller

      - name: PyInstaller Build
        shell: bash
        run: |
          # --- Workaround für macOS Intel (x64) Builds ---
          # Wir erzwingen hier die Ausführung von Python/Pip unter der Rosetta 2 (x86_64) Emulation
          # auf dem ARM-Server (macos-latest), da GitHub native Intel-Runner depräkatiert hat.
          if [[ "${{ matrix.artifact_name }}" == "Mac_Intel" ]]; then
            arch -x86_64 python -m pip install --upgrade pip
            # Auch hier muss 'websockets' zwingend mit installiert werden!
            arch -x86_64 pip install "setuptools<69.0.0" pygame websockets pyinstaller --force-reinstall
            arch -x86_64 pyinstaller --noconsole -n game main.py
          else
            pyinstaller --noconsole -n game main.py
          fi
          
          # Ordner vorbereiten und statische Assets in das Build-Verzeichnis kopieren
          cp -r assets dist/game/ || true
          cp highsscores.json dist/game/ || true
          
          # Ausführungsrechte für alle Unix-basierten Systeme (Linux & Mac) sichern
          if [[ "${{ matrix.os }}" != "windows-latest" ]]; then
            chmod +x dist/game/game || true
          fi

      - name: Archivieren (ZIP erstellen)
        shell: bash
        run: python -c "import shutil; shutil.make_archive('SpaceInvaders-${{ matrix.artifact_name }}', 'zip', 'dist/game')"

      - name: Test-Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: SpaceInvaders-${{ matrix.artifact_name }}
          path: SpaceInvaders-${{ matrix.artifact_name }}.zip
          retention-days: 7

  # --- Automatisches GitHub Release ---
  release:
    name: GitHub Release erstellen
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Alle Artifacts herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Release erstellen und Assets hochladen
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
