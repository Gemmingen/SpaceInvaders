name: Build Python Game (Cross-Platform)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build auf ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Wir bauen für Windows, Mac und Linux gleichzeitig
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - name: 1. Code auschecken
        uses: actions/checkout@v4

      - name: 2. Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Bibliotheken installieren (Pygame & PyInstaller)
        run: |
          python -m pip install --upgrade pip
          pip install pygame pyinstaller

      - name: 4. Spiel verpacken (PyInstaller)
        # HIER ANPASSEN: Ändere 'main.py', falls deine Hauptdatei anders heißt!
        run: |
          pyinstaller --noconsole --target-architecture universal2 main.py
      - name: 5. Assets in den fertigen Ordner kopieren
        # Wir nutzen 'bash', damit der Kopierbefehl auf Windows, Mac und Linux gleich funktioniert
        shell: bash 
        run: |
          # HIER ANPASSEN: 'assets' ist euer Bilder/Sound-Ordner. 
          # 'main' ist der Name eurer Python-Datei ohne '.py'.
          echo "Kopiere Assets..."
          cp -r assets dist/main/

      - name: 6. Fertiges Spiel als Download (Artefakt) bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: PythonGame-${{ matrix.os }}
          # Er lädt den kompletten Ordner hoch, in dem jetzt die .exe UND die Assets liegen
          path: dist/main/
